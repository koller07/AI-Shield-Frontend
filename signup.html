<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Free Trial - AI Shield</title>
    <link rel="icon" type="image/png" href="/icon_1_.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #002d5c;
            --primary-blue: #1e5ba8;
            --accent-cyan: #00a8e8;
            --accent-green: #22c55e;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(160deg, var(--primary-dark) 0%, #003d7a 50%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .signup-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-section img {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
        }

        .logo-section h1 {
            font-size: 1.75rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .plan-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .plan-details {
            background: var(--bg-light);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .plan-details h3 {
            font-size: 1.125rem;
            color: var(--primary-dark);
            margin-bottom: 0.75rem;
            font-weight: 800;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
        }

        .plan-price span {
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .plan-features {
            list-style: none;
            margin-top: 1rem;
        }

        .plan-features li {
            padding: 0.5rem 0;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .plan-features li::before {
            content: "✓";
            color: var(--accent-green);
            font-weight: 900;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--bg-white);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(0, 168, 232, 0.1);
        }

        .trial-notice {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .trial-notice p {
            color: var(--accent-green);
            font-weight: 700;
            font-size: 0.9375rem;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-green);
            color: white;
            padding: 1.25rem;
            border: none;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
            background: #16a34a;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        .login-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9375rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 640px) {
            .signup-container {
                padding: 2rem 1.5rem;
            }

            .plan-price {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo-section">
            <img src="/icon_1_.png" alt="AI Shield Logo">
            <h1>Start Your Free Trial</h1>
            <div class="plan-badge" id="planBadge">Professional Plan</div>
        </div>

        <div class="plan-details" id="planDetails">
            <h3 id="planName">Professional</h3>
            <div class="plan-price" id="planPrice">€49<span>/month</span></div>
            <ul class="plan-features" id="planFeatures">
                <li>5-25 users</li>
                <li>Advanced analytics</li>
                <li>Customisable policies</li>
            </ul>
        </div>

        <div class="trial-notice">
            <p>✓ 14 days free • No credit card required</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" required placeholder="John Smith">
            </div>

            <div class="form-group">
                <label for="email">Work Email *</label>
                <input type="email" id="email" required placeholder="john@company.com">
            </div>

            <div class="form-group">
                <label for="companyName">Company Name *</label>
                <input type="text" id="companyName" required placeholder="Acme Ltd">
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" required placeholder="Min 8 characters" minlength="8">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Start Free Trial
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://ai-shield-backend-production.up.railway.app';

        // Plan configurations
        const PLANS = {
            starter: {
                name: 'Starter',
                price: '€29',
                features: [
                    '1-3 users',
                    '25+ data types detected',
                    'Real-time alerts'
                ]
            },
            professional: {
                name: 'Professional',
                price: '€49',
                features: [
                    '5-25 users',
                    'Advanced analytics',
                    'Customisable policies'
                ]
            },
            business: {
                name: 'Business',
                price: '€149',
                features: [
                    '10-50 users',
                    'SSO/SAML integration',
                    'Dedicated account manager'
                ]
            },
            enterprise: {
                name: 'Enterprise',
                price: 'Custom',
                features: [
                    'Unlimited users',
                    'On-premise deployment',
                    'Custom ML models'
                ]
            }
        };

        // Get plan from URL
        const urlParams = new URLSearchParams(window.location.search);
        const selectedPlan = urlParams.get('plan') || 'professional';
        const plan = PLANS[selectedPlan] || PLANS.professional;

        // Update UI with plan details
        document.getElementById('planBadge').textContent = `${plan.name} Plan`;
        document.getElementById('planName').textContent = plan.name;
        document.getElementById('planPrice').innerHTML = `${plan.price}${plan.price !== 'Custom' ? '<span>/month</span>' : ''}`;
        
        const featuresList = document.getElementById('planFeatures');
        featuresList.innerHTML = plan.features.map(f => `<li>${f}</li>`).join('');

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');
            
            // Get form data
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const password = document.getElementById('password').value;

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            errorMsg.classList.remove('show');

            try {
                // Call signup API
                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: fullName,
                        email: email,
                        password: password,
                        companyName: companyName,
                        plan: selectedPlan
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Signup failed');
                }

                // Save auth data to localStorage
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('company', JSON.stringify(data.company));

                // Save to Chrome extension storage (if extension is installed)
                if (window.chrome && chrome.runtime) {
                    try {
                        chrome.storage.local.set({
                            authToken: data.token,
                            user: JSON.stringify(data.user),
                            company: JSON.stringify(data.company)
                        });
                    } catch (err) {
                        console.log('Extension not installed (optional)');
                    }
                }

                // Redirect to dashboard
                window.location.href = '/company-dashboard';

            } catch (error) {
                console.error('Signup error:', error);
                errorMsg.textContent = error.message || 'Failed to create account. Please try again.';
                errorMsg.classList.add('show');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Start Free Trial';
            }
        });

        // Enterprise plan redirect
        if (selectedPlan === 'enterprise') {
            document.getElementById('signupForm').addEventListener('submit', (e) => {
                e.preventDefault();
                alert('For Enterprise plans, please contact our sales team. Redirecting...');
                window.location.href = '/#pricing';
            });
        }
    </script>
</body>
</html>
