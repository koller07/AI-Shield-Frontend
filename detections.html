<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detections - AI Shield</title>
    <link rel="icon" type="image/png" href="/icon_1_.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-dark: #002d5c;
            --primary-blue: #1e5ba8;
            --accent-cyan: #00a8e8;
            --accent-green: #22c55e;
            --accent-orange: #ff6b35;
            --accent-red: #ef4444;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .dashboard-layout { display: flex; min-height: 100vh; }

        /* Sidebar Retrátil - Igual Overview */
        .sidebar {
            width: 260px;
            background: var(--primary-dark);
            color: white;
            padding: 1.5rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .sidebar-logo-text,
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .sidebar-user-info { display: none; }

        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1.5rem;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
        }

        .sidebar-logo img { width: 36px; height: 36px; min-width: 36px; }
        .sidebar-logo-text { font-size: 1.25rem; font-weight: 800; white-space: nowrap; }

        .toggle-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-nav { padding: 0 1rem; }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: 8px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.2s;
        }

        .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .sidebar-nav-item.active { background: var(--accent-cyan); color: white; }
        .sidebar-nav-icon { font-size: 1.25rem; min-width: 1.25rem; }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 0.75rem;
        }

        .sidebar-user-avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            background: var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .sidebar-user-info h4 { font-size: 0.875rem; font-weight: 600; }
        .sidebar-user-info p { font-size: 0.75rem; color: rgba(255,255,255,0.6); }

        .logout-btn {
            width: 100%;
            background: rgba(255, 107, 53, 0.15);
            border: 1px solid rgba(255, 107, 53, 0.3);
            color: var(--accent-orange);
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: var(--accent-orange);
            color: white;
        }

        /* Main Content */
        .main-content { 
            flex: 1; 
            margin-left: 260px; 
            padding: 2rem;
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded { margin-left: 80px; }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .header p { color: var(--text-secondary); }

        /* Filters */
        .filters-bar {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filter-group select,
        .filter-group input {
            padding: 0.625rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.875rem;
            min-width: 160px;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-green);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: var(--primary-dark);
            border: 1px solid var(--border-color);
        }

        /* Table */
        .table-card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 1rem 1.5rem;
            text-align: left;
            background: var(--bg-light);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover {
            background: var(--bg-light);
        }

        .badge {
            display: inline-flex;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-light);
            border-radius: 8px;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
            .filters-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/company-dashboard" class="sidebar-logo">
                    <img src="/icon_1_.png" alt="AI Shield">
                    <span class="sidebar-logo-text">AI Shield</span>
                </a>
                <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            </div>

            <nav class="sidebar-nav">
                <a href="/company-dashboard" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">📊</span>
                    <span class="nav-text">Overview</span>
                </a>
                <a href="/detections" class="sidebar-nav-item active">
                    <span class="sidebar-nav-icon">🔍</span>
                    <span class="nav-text">Detections</span>
                </a>
                <a href="/team" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">👥</span>
                    <span class="nav-text">Team</span>
                </a>
                <a href="/reports" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">📈</span>
                    <span class="nav-text">Reports</span>
                </a>
                <a href="/settings" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar" id="sidebarAvatar">AC</div>
                    <div class="sidebar-user-info">
                        <h4 id="sidebarCompany">Loading...</h4>
                        <p>Team Plan</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <span>🚪</span>
                    <span class="nav-text">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <header class="header">
                <h1>Detections</h1>
                <p>View and manage all sensitive data detections</p>
            </header>

            <!-- Filters -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Date Range</label>
                    <select id="dateFilter" onchange="applyFilters()">
                        <option value="all">All time</option>
                        <option value="today">Today</option>
                        <option value="week">Last 7 days</option>
                        <option value="month" selected>Last 30 days</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Data Type</label>
                    <select id="typeFilter" onchange="applyFilters()">
                        <option value="all">All Types</option>
                        <option value="CPF">CPF</option>
                        <option value="CNPJ">CNPJ</option>
                        <option value="IBAN">IBAN</option>
                        <option value="CREDIT_CARD">Credit Card</option>
                        <option value="EMAIL">Email</option>
                        <option value="PHONE">Phone</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>AI Platform</label>
                    <select id="platformFilter" onchange="applyFilters()">
                        <option value="all">All Platforms</option>
                        <option value="ChatGPT">ChatGPT</option>
                        <option value="Claude">Claude</option>
                        <option value="Gemini">Gemini</option>
                        <option value="Copilot">Copilot</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
                </div>

                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="exportData()">📥 Export CSV</button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-card">
                <div class="table-card-header">
                    <h3><span id="totalCount">0</span> Detections</h3>
                    <input type="text" id="searchInput" placeholder="Search..." 
                           onkeyup="applyFilters()"
                           style="padding: 0.625rem 1rem; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>

                <div id="tableContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h4>Loading detections...</h4>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Popup -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detection Details</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://ai-shield-backend-production.up.railway.app';
        let authToken = null;
        let currentCompany = null;
        let allDetections = [];
        let filteredDetections = [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        }

        async function init() {
            authToken = localStorage.getItem('authToken');
            const companyStr = localStorage.getItem('company');

            if (!authToken || !companyStr) {
                window.location.href = '/login';
                return;
            }

            currentCompany = JSON.parse(companyStr);
            const initials = currentCompany.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('sidebarAvatar').textContent = initials;
            document.getElementById('sidebarCompany').textContent = currentCompany.name;

            await loadDetections();
        }

        async function loadDetections() {
            try {
                const response = await fetch(`${API_URL}/api/detections/${currentCompany.id}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        logout();
                        return;
                    }
                    throw new Error('Failed');
                }

                allDetections = await response.json();
                filteredDetections = [...allDetections];
                renderTable();

            } catch (error) {
                document.getElementById('tableContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎉</div>
                        <h4>No detections yet!</h4>
                        <p>Install the Chrome extension to start monitoring</p>
                    </div>
                `;
            }
        }

        function applyFilters() {
            const dateFilter = document.getElementById('dateFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const platformFilter = document.getElementById('platformFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            filteredDetections = allDetections.filter(d => {
                // Date filter
                if (dateFilter !== 'all') {
                    const detectionDate = new Date(d.timestamp);
                    const now = new Date();
                    const daysDiff = (now - detectionDate) / (1000 * 60 * 60 * 24);
                    
                    if (dateFilter === 'today' && daysDiff > 1) return false;
                    if (dateFilter === 'week' && daysDiff > 7) return false;
                    if (dateFilter === 'month' && daysDiff > 30) return false;
                }

                // Type filter
                if (typeFilter !== 'all' && d.detection_type !== typeFilter) return false;

                // Platform filter
                if (platformFilter !== 'all' && d.ai_platform !== platformFilter) return false;

                // Search filter
                if (searchText && !d.user_id.toLowerCase().includes(searchText) && 
                    !d.detection_type.toLowerCase().includes(searchText)) {
                    return false;
                }

                return true;
            });

            renderTable();
        }

        function clearFilters() {
            document.getElementById('dateFilter').value = 'month';
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('platformFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        function renderTable() {
            const container = document.getElementById('tableContainer');
            document.getElementById('totalCount').textContent = filteredDetections.length;

            if (filteredDetections.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h4>No detections found</h4>
                        <p>Try adjusting your filters</p>
                    </div>
                `;
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Data Type</th>
                            <th>AI Platform</th>
                            <th>Date & Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredDetections.map((d, i) => {
                            const date = new Date(d.timestamp);
                            return `
                                <tr>
                                    <td>${d.user_id}</td>
                                    <td><span class="badge">${d.detection_type}</span></td>
                                    <td>${d.ai_platform || 'Unknown'}</td>
                                    <td>${date.toLocaleDateString('en-GB')} ${date.toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'})}</td>
                                    <td><button class="btn btn-secondary" onclick="viewDetails(${i})" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">View</button></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function viewDetails(index) {
            const detection = filteredDetections[index];
            const date = new Date(detection.timestamp);

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">User</span>
                    <span class="detail-value">${detection.user_id}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Data Type</span>
                    <span class="detail-value">${detection.detection_type}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">AI Platform</span>
                    <span class="detail-value">${detection.ai_platform || 'Unknown'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date</span>
                    <span class="detail-value">${date.toLocaleDateString('en-GB')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Time</span>
                    <span class="detail-value">${date.toLocaleTimeString('en-GB')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">URL</span>
                    <span class="detail-value" style="word-break: break-all;">${detection.url || 'N/A'}</span>
                </div>
            `;

            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function exportData() {
            if (filteredDetections.length === 0) {
                alert('No data to export');
                return;
            }

            const csv = [
                ['User', 'Data Type', 'AI Platform', 'Date', 'Time', 'URL'],
                ...filteredDetections.map(d => {
                    const date = new Date(d.timestamp);
                    return [
                        d.user_id,
                        d.detection_type,
                        d.ai_platform || 'Unknown',
                        date.toLocaleDateString('en-GB'),
                        date.toLocaleTimeString('en-GB'),
                        d.url || 'N/A'
                    ];
                })
            ].map(row => row.join(',')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `detections_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        init();
    </script>
</body>
</html>
