<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AI Shield Dashboard</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-dark: #002d5c;
            --primary-blue: #1e5ba8;
            --accent-cyan: #00a8e8;
            --accent-green: #22c55e;
            --accent-orange: #ff6b35;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border-color: #e2e8f0;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .dashboard-layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--primary-dark);
            color: white;
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }

        .sidebar-logo-img {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
        }

        .sidebar-logo-img img { width: 36px; height: 36px; }
        .sidebar-logo-text { font-size: 1.25rem; font-weight: 800; }
        .sidebar-nav { padding: 0 1rem; }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: 8px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.2s;
        }

        .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); }
        .sidebar-nav-item.active { background: var(--accent-cyan); color: white; }
        .sidebar-nav-icon { font-size: 1.25rem; }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }

        .sidebar-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .sidebar-user-info h4 { font-size: 0.875rem; font-weight: 600; }
        .sidebar-user-info p { font-size: 0.75rem; color: rgba(255,255,255,0.6); }

        /* Main Content */
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; }

        .header { margin-bottom: 2rem; }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .header p { color: var(--text-secondary); }

        /* Report Generator */
        .report-generator {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .report-generator h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--primary-dark);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group select,
        .form-group input {
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9375rem;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .btn {
            padding: 0.875rem 1.75rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent-green);
            color: white;
        }

        .btn-primary:hover { background: #16a34a; }

        .btn-secondary {
            background: white;
            color: var(--primary-dark);
            border: 1px solid var(--border-color);
        }

        .report-actions {
            display: flex;
            gap: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        /* Recent Reports */
        .recent-reports {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .recent-reports-header {
            padding: 1.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .recent-reports-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .reports-list {
            padding: 1.5rem;
        }

        .report-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .report-item:hover {
            box-shadow: var(--shadow-md);
        }

        .report-info h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .report-info p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .report-meta {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .report-stat {
            text-align: center;
        }

        .report-stat-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary-blue);
        }

        .report-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .report-actions-item {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 220px; }
            .main-content { margin-left: 220px; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1.5rem; }
            .report-item { flex-direction: column; gap: 1rem; }
            .report-meta { width: 100%; justify-content: space-around; }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <a href="/" class="sidebar-logo-img">
                    <img src="/icon_1_.png" alt="AI Shield">
                    <span class="sidebar-logo-text">AI Shield</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="/company-dashboard" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">📊</span>
                    <span>Overview</span>
                </a>
                <a href="/detections" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">🔍</span>
                    <span>Detections</span>
                </a>
                <a href="/team" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">👥</span>
                    <span>Team</span>
                </a>
                <a href="/reports" class="sidebar-nav-item active">
                    <span class="sidebar-nav-icon">📈</span>
                    <span>Reports</span>
                </a>
                <a href="/settings" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">AC</div>
                    <div class="sidebar-user-info">
                        <h4>Acme Corp</h4>
                        <p>Team Plan</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Reports</h1>
                <p>Generate and export compliance reports for your team</p>
            </header>

            <!-- Report Generator -->
            <div class="report-generator">
                <h2>Generate New Report</h2>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Report Period</label>
                        <select id="reportPeriod">
                            <option value="current_month">Current Month</option>
                            <option value="last_month">Last Month</option>
                            <option value="last_3_months">Last 3 Months</option>
                            <option value="last_6_months">Last 6 Months</option>
                            <option value="custom">Custom Range</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Report Type</label>
                        <select id="reportType">
                            <option value="compliance">Compliance Summary</option>
                            <option value="detections">Detections Report</option>
                            <option value="team">Team Activity</option>
                            <option value="executive">Executive Summary</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Format</label>
                        <select id="reportFormat">
                            <option value="pdf">PDF</option>
                            <option value="excel">Excel (.xlsx)</option>
                            <option value="csv">CSV</option>
                        </select>
                    </div>
                </div>

                <div class="report-actions">
                    <button class="btn btn-primary" onclick="generateReport()">
                        📄 Generate Report
                    </button>
                    <button class="btn btn-secondary" onclick="scheduleReport()">
                        📅 Schedule Report
                    </button>
                </div>
            </div>

            <!-- Recent Reports -->
            <div class="recent-reports">
                <div class="recent-reports-header">
                    <h2>Recent Reports</h2>
                </div>
                <div class="reports-list" id="reportsList">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const recentReports = [
            {
                name: 'March 2026 - Compliance Summary',
                date: '2026-03-01',
                detections: 1247,
                finesPrevented: '€623K',
                format: 'PDF'
            },
            {
                name: 'February 2026 - Team Activity',
                date: '2026-02-01',
                detections: 1105,
                finesPrevented: '€552K',
                format: 'Excel'
            },
            {
                name: 'January 2026 - Executive Summary',
                date: '2026-01-01',
                detections: 987,
                finesPrevented: '€493K',
                format: 'PDF'
            },
            {
                name: 'Q4 2025 - Quarterly Report',
                date: '2025-12-31',
                detections: 3421,
                finesPrevented: '€1.7M',
                format: 'PDF'
            }
        ];

        function populateReports() {
            const list = document.getElementById('reportsList');
            list.innerHTML = recentReports.map(report => `
                <div class="report-item">
                    <div class="report-info">
                        <h3>${report.name}</h3>
                        <p>Generated on ${new Date(report.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                    </div>
                    <div class="report-meta">
                        <div class="report-stat">
                            <div class="report-stat-value">${report.detections}</div>
                            <div class="report-stat-label">Detections</div>
                        </div>
                        <div class="report-stat">
                            <div class="report-stat-value">${report.finesPrevented}</div>
                            <div class="report-stat-label">Prevented</div>
                        </div>
                        <div class="report-actions-item">
                            <button class="btn btn-primary btn-small" onclick="downloadReport('${report.name}')">
                                📥 Download ${report.format}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function generateReport() {
            const period = document.getElementById('reportPeriod').value;
            const type = document.getElementById('reportType').value;
            const format = document.getElementById('reportFormat').value;
            
            alert(`Generating ${type} report for ${period} in ${format.toUpperCase()} format...\n\nYour report will be ready in a few moments and sent to your email.`);
        }

        function scheduleReport() {
            alert('Schedule automatic monthly reports feature coming soon!\n\nYou will be able to schedule reports to be generated and emailed automatically on the 1st of each month.');
        }

        function downloadReport(name) {
            alert(`Downloading: ${name}\n\nThe report would be downloaded as a PDF/Excel file.`);
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateReports();
        });
    </script>
</body>
</html>
